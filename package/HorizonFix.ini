[General]
# fWaterSkirtRadius is the radius of the water horizon. Larger number is more convincing but less performant
fWaterSkirtRadius=2000000.0
# fWaterSkirtZOffset is the offset of the water skirt from the ocean height. This must be 0.0 if using CS environmental height fog
# Negative values will make the skirt sink below the ocean, positive values will make it float above.
fWaterSkirtZOffset=0.0
# iWaterSkirtRimQuality (0-6) sets how finely the skirt's circular outer edge is tessellated. Tiles
# crossing the rim are split in half up to this many times; every step halves the silhouette step size
# and roughly doubles the rim's draw calls.
iWaterSkirtRimQuality=2
# bWaterSkirtNearWater draws skirt water in the 3x3 LOD blocks around the player, yielding
# automatically to the game's own water (blocks touching live water are subdivided and only the
# pieces the water fully covers are skipped). This fills gaps in worldspaces whose distant water
# does not reach the player's area, e.g. small custom maps without generated LOD. Costs a few
# extra draw calls near water bodies. Set to 0 to leave the 3x3 around the player empty instead.
bWaterSkirtNearWater=1
# sWorldSpaceBlocklist is a comma-separated list of worldspace editor IDs where the mod is disabled.
# Matching is case-insensitive. Leave empty to enable the mod everywhere.
# Examples:
#   disable in the main Skyrim overworld:  sWorldSpaceBlocklist=Tamriel
#   disable on Solstheim:                  sWorldSpaceBlocklist=DLC2SolstheimWorld
#   disable in both:                       sWorldSpaceBlocklist=Tamriel,DLC2SolstheimWorld
sWorldSpaceBlocklist=
