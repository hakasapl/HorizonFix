[General]
# fWaterSkirtRadius is the apparent distance of the ocean horizon. The skirt is rescaled to always fit
# inside the game's normal far clip plane, so this does not affect the far clip or anything besides water.
fWaterSkirtRadius=2000000.0
# fWaterSkirtZOffset is the offset of the water skirt from the ocean height. Keeping it small minimizes
# the surface-height difference ENB's water shading can show at the vanilla LOD water cutoff; make it
# more negative if you see z-fighting between the skirt and real water.
fWaterSkirtZOffset=-2000.0
# bWaterSkirtDrawLast makes the skirt draw right after the game's own LOD water, inside the same
# technique block with the same shader constants. ENB's enhanced LOD water reads constants that earlier
# game water draws fill in; without this the skirt can be the first water drawn in a frame and miss
# those effects. Set to 0 only for troubleshooting.
bWaterSkirtDrawLast=1
